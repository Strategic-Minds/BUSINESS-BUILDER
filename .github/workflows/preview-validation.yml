name: "Preview Validation — Build, Test, QA, Screenshots"

on:
  pull_request:
    branches: [main, "setup/**", "feat/**", "fix/**"]
  workflow_dispatch:
    inputs:
      run_playwright:
        description: "Run Playwright tests"
        required: false
        default: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PLAYWRIGHT_BASE_URL: "http://localhost:3000"
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  QA_AGENT_SECRET: ${{ secrets.QA_AGENT_SECRET }}
  # Preview-safe env — no production secrets
  NEXT_PUBLIC_APP_NAME: "Strategic Minds AI Business Factory"
  NEXT_PUBLIC_PRIMARY_VERTICAL: "epoxy"
  NEXT_PUBLIC_DEFAULT_THEME: "dark"
  SQUARE_ENVIRONMENT: "sandbox"
  SEO_AGENT_ENABLED: "true"
  XPS_VISUALIZER_URL: "https://xtremepolishingsystems.com/pages/flake-visualizer"
  XPS_ASSET_LICENSE_STATUS: "public-link-only"
  GOOGLE_VAULT_ENABLED: "false"
  CUSTOM_VISUALIZER_ENABLED: "false"

jobs:
  # ── Job 1: Install ──────────────────────────────────────────────
  install:
    name: "Install Dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles("package-lock.json") }}

  # ── Job 2: Build ────────────────────────────────────────────────
  build:
    name: "Next.js Build"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 1

  # ── Job 3: Unit Tests ───────────────────────────────────────────
  unit-tests:
    name: "Unit Tests (Vitest)"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - run: npm test -- --reporter=verbose
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vitest-report
          path: vitest-report/

  # ── Job 4: Playwright E2E ────────────────────────────────────────
  playwright:
    name: "Playwright E2E + Screenshots"
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.run_playwright != 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start server and run tests
        run: |
          npm run build
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder_anon_key' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: docs/release/screenshots/
          retention-days: 7

  # ── Job 5: Lighthouse ────────────────────────────────────────────
  lighthouse:
    name: "Lighthouse Performance Audit"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - name: Run Lighthouse
        run: |
          npm run build
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:lighthouse
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: docs/release/lighthouse-report.*
          retention-days: 7

  # ── Job 6: QA Score ─────────────────────────────────────────────
  qa-score:
    name: "QA System Score"
    needs: [playwright, lighthouse]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { name: playwright-report, path: playwright-report/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: lighthouse-report, path: docs/release/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: screenshots, path: docs/release/screenshots/ }
        continue-on-error: true
      - run: node scripts/score-system.mjs
        continue-on-error: true
      - run: node scripts/check-tool-access.mjs
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-report
          path: |
            docs/release/qa-score.json
            docs/release/qa-report.md
            docs/release/tool-access-report.md
          retention-days: 14

  # ── Job 7: Summary ──────────────────────────────────────────────
  summary:
    name: "Pipeline Summary"
    needs: [build, unit-tests, playwright, lighthouse, qa-score]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: qa-report, path: docs/release/ }
        continue-on-error: true
      - name: Post summary
        run: |
          echo "## Pipeline Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f docs/release/qa-score.json ]; then
            score=$(node -e "const f=require('./docs/release/qa-score.json'); console.log(f.overall_score+'/100 ('+f.grade+')')") 
            echo "**QA Score:** $score" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts: playwright-report | screenshots | qa-report | lighthouse-report" >> $GITHUB_STEP_SUMMARY
